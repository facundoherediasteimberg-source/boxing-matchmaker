<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Boxing Matchmaker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #252525;
      --bg4: #2e2e2e;
      --border: #333;
      --text: #f0f0f0;
      --text2: #aaa;
      --text3: #555;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --gray: #555;
      --orange: #f97316;
      --orange2: #ea6c0a;
      --nav-h: 64px;
      --header-h: 56px;
    }
    body.light {
      --bg: #f4f4f5;
      --bg2: #ffffff;
      --bg3: #e4e4e7;
      --bg4: #d4d4d8;
      --border: #d1d5db;
      --text: #111827;
      --text2: #6b7280;
      --text3: #9ca3af;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --green: #16a34a;
      --yellow: #ca8a04;
      --red: #dc2626;
      --gray: #9ca3af;
      --orange: #ea6c0a;
      --orange2: #c2570a;
    }
    html { height: 100%; height: -webkit-fill-available; }
    body { height: 100%; min-height: 100vh; min-height: -webkit-fill-available; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.4; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; position: fixed; inset: 0; }

    /* ── NAV ── */
    #bottom-nav { display: flex; background: var(--bg2); border-top: 1px solid var(--border); height: var(--nav-h); flex-shrink: 0; z-index: 100; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; color: var(--text2); font-size: 11px; cursor: pointer; padding: 4px 2px; transition: color .15s; -webkit-tap-highlight-color: transparent; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── TABS ── */
    .tab-panel { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .tab-panel.active { display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .tab-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
    .tab-title { font-size: 18px; font-weight: 700; }

    /* ── BOTONES ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; min-height: 44px; padding: 10px 16px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s, opacity .15s; -webkit-tap-highlight-color: transparent; }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-ghost { background: var(--bg3); color: var(--text); }
    .btn-ghost:hover { background: var(--bg4); }
    .btn-sm { min-height: 36px; padding: 6px 12px; font-size: 13px; }
    .btn-full { width: 100%; }
    .btn-icon { min-height: 36px; min-width: 36px; padding: 6px; border-radius: 8px; }

    /* ── BADGES ── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; white-space: nowrap; }
    .badge-libre { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .badge-emparejado { background: rgba(234,179,8,.15); color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
    .badge-baja { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
    .badge-cancelado { background: rgba(85,85,85,.2); color: var(--gray); border: 1px solid rgba(85,85,85,.3); }

    /* ── CARDS ── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .card + .card { margin-top: 10px; }

    /* ── STATS ── */
    #stats-bar { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; padding: 10px 16px; flex-shrink: 0; }
    .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 800; }
    .stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
    #stats-bar .stat-num { font-size: 17px; }
    #stats-bar .stat-label { font-size: 9px; letter-spacing: 0; }
    #stats-bar .stat-box { padding: 8px 4px; }

    /* ── FILTER BAR ── */
    .filter-bar { padding: 8px 16px; display: flex; gap: 8px; flex-shrink: 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .filter-toggle { min-height: 36px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 13px; cursor: pointer; }
    .filter-toggle.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-input { flex: 1; min-width: 120px; height: 36px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 0 10px; }
    .filter-select { height: 36px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 0 8px; cursor: pointer; }
    .filter-weight { display: flex; gap: 4px; align-items: center; }
    .filter-weight input { width: 60px; height: 36px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 0 8px; }
    .filter-weight span { color: var(--text2); font-size: 13px; }

    /* ── BOXER LIST ── */
    #list-boxeadores { padding: 12px 16px 80px; flex: 1; }
    .boxer-row { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 10px; transition: background .15s; }
    .boxer-row:active { background: var(--bg3); }
    .boxer-row.baja { opacity: .5; }
    .boxer-row-info { flex: 1; min-width: 0; }
    .boxer-name { font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .boxer-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }

    /* ── MATCH TAB ── */
    #match-select-panel { padding: 12px 16px 80px; flex: 1; overflow-y: auto; }
    #match-rival-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #match-sticky { background: var(--bg2); border-bottom: 2px solid var(--accent); padding: 12px 16px; flex-shrink: 0; }
    #match-sticky-name { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    #match-sticky-info { font-size: 13px; color: var(--text2); }
    #match-rival-filters { padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; background: var(--bg); }
    #match-rival-list { flex: 1; overflow-y: auto; padding: 10px 16px 80px; }
    .rival-row { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .rival-row.discarded { opacity: .45; }
    .rival-row-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .rival-row-top > div:first-child { flex: 1; min-width: 0; }
    .rival-name { font-weight: 700; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rival-sub { font-size: 12px; color: var(--text2); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .score-bar-wrap { margin-bottom: 8px; }
    .score-bar-bg { background: var(--bg4); border-radius: 999px; height: 6px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #3b82f6, #22c55e); transition: width .3s; }
    .score-meta { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; color: var(--text2); }
    .discard-reason { font-size: 12px; color: var(--gray); font-style: italic; }
    .rival-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

    /* ── PELEAS TAB ── */
    #peleas-content { padding: 10px 16px 80px; flex: 1; overflow-y: auto; }
    .bloque-section { margin-bottom: 18px; }
    .bloque-header { background: linear-gradient(135deg, var(--orange) 0%, var(--orange2) 100%); border: none; border-radius: 12px 12px 0 0; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; font-weight: 800; font-size: 14px; cursor: grab; color: #fff; letter-spacing: .3px; box-shadow: 0 2px 8px rgba(249,115,22,.35); }
    .bloque-header:active { cursor: grabbing; }
    .bloque-header .handle { color: rgba(255,255,255,.6); margin-right: 8px; }
    .bloque-header-count { background: rgba(0,0,0,.2); border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 700; color: #fff; }
    .bloque-list { border: 2px solid var(--orange); border-top: none; border-radius: 0 0 12px 12px; min-height: 10px; overflow: hidden; }
    .pelea-item { background: var(--bg2); padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
    .pelea-item:last-child { border-bottom: none; border-radius: 0 0 10px 10px; }
    .pelea-handle { color: var(--text3); cursor: grab; font-size: 18px; padding-top: 2px; flex-shrink: 0; }
    .pelea-handle:active { cursor: grabbing; }
    .pelea-info { flex: 1; min-width: 0; }
    .pelea-names { font-weight: 700; font-size: 15px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pelea-detail { font-size: 12px; color: var(--text2); }
    .pelea-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .pelea-item.cancelada { opacity: .4; }
    .canceladas-section { margin-top: 16px; }
    .section-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 8px; padding: 0 2px; }

    /* ── BLOQUES TAB ── */
    #bloques-content { padding: 12px 16px 80px; flex: 1; overflow-y: auto; }
    .bloque-card { background: linear-gradient(135deg, var(--orange) 0%, var(--orange2) 100%); border: none; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; box-shadow: 0 3px 10px rgba(249,115,22,.3); color: #fff; }
    .bloque-card-handle { color: rgba(255,255,255,.6); cursor: grab; font-size: 20px; flex-shrink: 0; }
    .bloque-card-info { flex: 1; }
    .bloque-card-name { font-weight: 800; font-size: 16px; color: #fff; }
    .bloque-card-sub { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 3px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
    .form-input { width: 100%; height: 44px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 0 14px; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-select { width: 100%; height: 44px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 0 14px; cursor: pointer; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .radio-btn { min-height: 40px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 14px; cursor: pointer; transition: all .15s; }
    .radio-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto; padding: 20px 20px 40px; position: relative; }
    .modal-handle { width: 40px; height: 4px; background: var(--bg4); border-radius: 99px; margin: 0 auto 16px; }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg4); color: var(--text2); font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; padding-right: 36px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; }
    .modal-sep { height: 1px; background: var(--border); margin: 16px 0; }

    /* ── LOADER ── */
    #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; font-size: 20px; font-weight: 700; color: var(--text2); }
    #loader.hidden { display: none; }

    /* ── PIN SCREEN ── */
    #pin-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; }
    #pin-screen.hidden { display: none; }
    .pin-box { width: 100%; max-width: 340px; text-align: center; }
    .pin-logo { font-size: 52px; margin-bottom: 8px; }
    .pin-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .pin-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
    .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 28px; }
    .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: background .15s, border-color .15s; }
    .pin-dot.filled { background: var(--orange); border-color: var(--orange); }
    .pin-dot.error { background: var(--red); border-color: var(--red); }
    .pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .pin-key { height: 64px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 22px; font-weight: 700; cursor: pointer; transition: background .1s, transform .1s; -webkit-tap-highlight-color: transparent; }
    .pin-key:active { background: var(--bg3); transform: scale(.94); }
    .pin-key.del { font-size: 18px; }
    .pin-error { color: var(--red); font-size: 13px; font-weight: 600; margin-top: 14px; min-height: 20px; }
    .pin-badge-lector { display: inline-block; background: rgba(234,179,8,.15); color: var(--yellow); border: 1px solid rgba(234,179,8,.3); border-radius: 999px; padding: 3px 12px; font-size: 12px; font-weight: 700; margin-top: 16px; }
    .lector-banner { background: rgba(234,179,8,.1); border-bottom: 2px solid var(--yellow); padding: 8px 16px; font-size: 13px; font-weight: 700; color: var(--yellow); text-align: center; flex-shrink: 0; display: none; }
    body.modo-lector .lector-banner { display: block; }

    /* Modo lector: ocultar todos los botones de acción */
    body.modo-lector .btn-primary,
    body.modo-lector .btn-danger,
    body.modo-lector #theme-toggle { /* theme-toggle sí se muestra */ }
    body.modo-lector .tab-header .btn-primary { display: none; }
    body.modo-lector .tab-header .btn-ghost:not(#theme-toggle) { display: none; }
    body.modo-lector .pelea-actions-row { display: none; }
    body.modo-lector .rival-actions { display: none; }
    body.modo-lector .filter-toggle { pointer-events: auto; } /* filtros sí funcionan */
    body.modo-lector #modal-perfil .btn-ghost:not(:first-child),
    body.modo-lector #modal-perfil .btn-danger { display: none; }
    body.modo-lector .canceladas-section .btn-danger { display: none; }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: calc(var(--nav-h) + 10px); left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; font-size: 14px; font-weight: 600; z-index: 500; opacity: 0; transition: opacity .3s; white-space: nowrap; }
    #toast.show { opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── PRESENCE BTN ── */
    .presence-btn { min-width: 34px; min-height: 34px; padding: 4px; border: none; background: transparent; cursor: pointer; font-size: 18px; flex-shrink: 0; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    .presence-btn:active { background: var(--bg3); }
    body.modo-lector .presence-btn { pointer-events: none; opacity: .5; }

    /* ── MINI MENÚ ── */
    #mini-menu { position: fixed; z-index: 300; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.45); min-width: 190px; overflow: hidden; display: none; }
    #mini-menu.open { display: block; }
    .mini-menu-item { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--border); transition: background .1s; -webkit-tap-highlight-color: transparent; }
    .mini-menu-item:last-child { border-bottom: none; }
    .mini-menu-item:active { background: var(--bg3); }
    .mini-menu-item.active-opt { color: var(--accent); }
    #mini-menu-backdrop { position: fixed; inset: 0; z-index: 299; display: none; }
    #mini-menu-backdrop.open { display: block; }

    /* ── ASISTENCIA EN PELEAS ── */
    .pelea-asistencia { font-size: 13px; margin-top: 6px; padding: 3px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
    .asist-verde { background: rgba(34,197,94,.12); color: var(--green); }
    .asist-amarillo { background: rgba(234,179,8,.12); color: var(--yellow); }
    .asist-rojo { background: rgba(239,68,68,.12); color: var(--red); }
    .asist-gris { background: var(--bg3); color: var(--text3); }
    .pelea-item.asist-alerta { border-left: 3px solid var(--red); }

    /* ── DRAG GHOST ── */
    .sortable-ghost { opacity: .3; }
    .sortable-drag { opacity: 1; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  </style>
</head>
<body>

<div id="loader">Cargando…</div>
<div id="toast"></div>

<!-- ═══════════ PIN SCREEN ═══════════ -->
<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-logo">🥊</div>
    <div class="pin-title">Boxing Matchmaker</div>
    <div class="pin-sub">Ingresá tu PIN para continuar</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" onclick="pinPress('0')" style="grid-column:2">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div id="app">
  <div class="lector-banner">👁️ Modo lectura — solo visualización</div>

  <!-- ═══════════ TAB: BOXEADORES ═══════════ -->
  <div id="tab-boxeadores" class="tab-panel active">
    <div class="tab-header">
      <span class="tab-title">🥊 Boxeadores</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost btn-sm btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema" style="font-size:18px">🌙</button>
        <button class="btn btn-primary btn-sm" onclick="showAddBoxer()">+ Agregar</button>
      </div>
    </div>
    <div id="stats-bar">
      <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-emp">0</div><div class="stat-label">Empare.</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-lib">0</div><div class="stat-label">Libres</div></div>

<script>
// ══════════════════════════════════════════
//  CONFIG — reemplazá estos valores
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://cutabahkbqshlkgfqqwu.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1dGFiYWhrYnFzaGxrZ2ZxcXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MDEyMDgsImV4cCI6MjA5NDE3NzIwOH0.kjwrdsF310LG1oQ83tISzECic42IcijD57q_f-Va9mo';

// ══════════════════════════════════════════
//  PIN DE ACCESO
// ══════════════════════════════════════════
const PIN_EDITOR = '2508';
const PIN_LECTOR = '0000';

let _pinBuffer = '';
let _modoLector = false;

function isLector() { return _modoLector; }

function pinPress(digit) {
  if (_pinBuffer.length >= 4) return;
  _pinBuffer += digit;
  updatePinDots();
  if (_pinBuffer.length === 4) setTimeout(checkPin, 120);
}

function pinDel() {
  _pinBuffer = _pinBuffer.slice(0, -1);
  document.getElementById('pin-error').textContent = '';
  updatePinDots(false);
}

function updatePinDots(error = false) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    dot.classList.toggle('filled', i < _pinBuffer.length && !error);
    dot.classList.toggle('error', error);
  }
}

function checkPin() {
  if (_pinBuffer === PIN_EDITOR) {
    _modoLector = false;
    enterApp();
  } else if (_pinBuffer === PIN_LECTOR) {
    _modoLector = true;
    enterApp();
  } else {
    updatePinDots(true);
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Intentá de nuevo.';
    setTimeout(() => {
      _pinBuffer = '';
      updatePinDots(false);
    }, 800);
  }
}

function enterApp() {
  document.getElementById('pin-screen').classList.add('hidden');
  if (_modoLector) document.body.classList.add('modo-lector');
  init();
}

// PIN requerido en cada apertura — sin sessionStorage

// ══════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STATE = {
  boxeadores: [],
  peleas: [],
  bloques: [],
  peleasBloques: [],
  activeTab: 'boxeadores',
  matchBase: null,         // boxeador seleccionado como base en Match
  filtroLibres: false,
};

let _confirmCb = null;
let _sortableInstances = [];

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
async function init() {
  await loadAll();
  subscribeRealtime();
  hideLoader();
  render();
  // Sincronizar ícono de tema
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
}

async function loadAll() {
  const [b, p, bl, pb] = await Promise.all([
    sb.from('boxeadores').select('*').order('nombre'),
    sb.from('peleas').select('*').order('orden'),
    sb.from('bloques').select('*').order('orden'),
    sb.from('pelea_bloque').select('*').order('posicion'),
  ]);
  STATE.boxeadores   = b.data  || [];
  STATE.peleas       = p.data  || [];
  STATE.bloques      = bl.data || [];
  STATE.peleasBloques= pb.data || [];
}

function subscribeRealtime() {
  sb.channel('all-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'boxeadores'   }, reloadAndRender)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'peleas'       }, reloadAndRender)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'bloques'      }, reloadAndRender)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'pelea_bloque' }, reloadAndRender)
    .subscribe();
}

async function reloadAndRender() {
  await loadAll();
  render();
}

function render() {
  renderBoxeadores();
  renderMatchSelect();
  if (STATE.matchBase) renderRivales();
  renderPeleas();
  renderBloques();
  updateGymDropdowns();
}

function hideLoader() {
  document.getElementById('loader').classList.add('hidden');
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function getPeleaActiva(boxeadorId) {
  return STATE.peleas.find(p =>
    !p.cancelada && (p.boxeador1_id === boxeadorId || p.boxeador2_id === boxeadorId)
  );
}

function getBadge(boxeador) {
  if (boxeador.baja) return '<span class="badge badge-baja">Baja</span>';
  const pelea = getPeleaActiva(boxeador.id);
  if (pelea) return '<span class="badge badge-emparejado">Emparejado</span>';
  return '<span class="badge badge-libre">Libre</span>';
}

function getGimnasios() {
  const gyms = [...new Set(STATE.boxeadores.map(b => b.gimnasio).filter(Boolean))].sort();
  return gyms;
}

function updateGymDropdowns() {
  const gyms = getGimnasios();
  const opts = '<option value="">Todos los gimn.</option>' + gyms.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('');
  ['match-gym-filter', 'rival-gym-filter', 'boxer-gym-filter', 'peleas-gym-filter'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { const v = el.value; el.innerHTML = opts; el.value = v; }
  });
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, duration = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function switchTab(name) {
  STATE.activeTab = name;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function confirmCallback() {
  closeModal('modal-confirm');
  if (_confirmCb) { _confirmCb(); _confirmCb = null; }
}

function showConfirm(title, body, cb, { showMotivo = false, dangerLabel = 'Confirmar' } = {}) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent  = body;
  document.getElementById('confirm-ok-btn').textContent = dangerLabel;
  const motivoWrap = document.getElementById('confirm-motivo-wrap');
  const motivoInput = document.getElementById('confirm-motivo');
  if (showMotivo) { motivoWrap.style.display = ''; motivoInput.value = ''; }
  else             { motivoWrap.style.display = 'none'; }
  _confirmCb = cb;
  openModal('modal-confirm');
}

// ══════════════════════════════════════════
//  TAB: BOXEADORES
// ══════════════════════════════════════════
function toggleFiltroLibres() {
  STATE.filtroLibres = !STATE.filtroLibres;
  document.getElementById('toggle-libres').classList.toggle('active', STATE.filtroLibres);
  renderBoxeadores();
}

function getPresenceIcon(b) {
  if (b.baja) return '🔴';
  if (b.presente === true) return '✅';
  return '⬜';
}

function renderBoxeadores() {
  const search = document.getElementById('search-boxeadores').value.toLowerCase();
  const gym    = document.getElementById('boxer-gym-filter')?.value || '';
  const sort   = document.getElementById('boxer-sort')?.value || 'carga';
  let boxeadores = [...STATE.boxeadores];

  // Calcular stats antes de filtrar
  const totales     = STATE.boxeadores.filter(b => !b.baja);
  const emparejados = totales.filter(b => getPeleaActiva(b.id));
  const libres      = totales.filter(b => !getPeleaActiva(b.id));
  const bajas       = STATE.boxeadores.filter(b => b.baja);
  const presentes   = STATE.boxeadores.filter(b => !b.baja && b.presente === true);
  document.getElementById('stat-total').textContent = STATE.boxeadores.length;
  document.getElementById('stat-emp').textContent   = emparejados.length;
  document.getElementById('stat-lib').textContent   = libres.length;
  document.getElementById('stat-baj').textContent   = bajas.length;
  document.getElementById('stat-pres').textContent  = presentes.length;

  // Filtros
  if (search)             boxeadores = boxeadores.filter(b => b.nombre?.toLowerCase().includes(search));
  if (STATE.filtroLibres) boxeadores = boxeadores.filter(b => !b.baja && !getPeleaActiva(b.id));
  if (gym)                boxeadores = boxeadores.filter(b => b.gimnasio === gym);

  // Ordenar
  if (sort === 'nombre') {
    boxeadores.sort((a, b) => (a.nombre||'').localeCompare(b.nombre||''));
  } else if (sort === 'gimnasio') {
    boxeadores.sort((a, b) =>
      (a.gimnasio||'').localeCompare(b.gimnasio||'') || (a.nombre||'').localeCompare(b.nombre||'')
    );
  } else {
    // 'carga': libres → emparejados → bajas, luego por created_at
    boxeadores.sort((a, b) => {
      const getOrd = x => x.baja ? 2 : getPeleaActiva(x.id) ? 1 : 0;
      return getOrd(a) - getOrd(b) || new Date(a.created_at || 0) - new Date(b.created_at || 0);
    });
  }

  const container = document.getElementById('list-boxeadores');
  if (!boxeadores.length) {
    container.innerHTML = `<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg><p>No hay boxeadores</p></div>`;
    return;
  }

  container.innerHTML = boxeadores.map(b => `

let _miniMenuBoxeadorId = null;

function showMiniMenu(id, btnEl) {
  if (isLector()) return;
  _miniMenuBoxeadorId = id;
  const b = STATE.boxeadores.find(x => x.id === id);
  if (!b) return;

  const menu     = document.getElementById('mini-menu');
  const backdrop = document.getElementById('mini-menu-backdrop');
  const content  = document.getElementById('mini-menu-content');

  const isSinConf = b.presente !== true && !b.baja;
  const isPresente = b.presente === true && !b.baja;

  const items = [
    { icon: '⬜', label: 'Sin confirmar', action: `setPresenteStatus('${id}',null)`,  active: isSinConf   },
    { icon: '✅', label: 'Presente',       action: `setPresenteStatus('${id}',true)`, active: isPresente  },
    b.baja
      ? { icon: '🟢', label: 'Quitar baja', action: `quitarBajaMenu('${id}')`, active: false }
      : { icon: '🔴', label: 'Dar de baja', action: `marcarBajaMenu('${id}')`, active: false },
  ];

  content.innerHTML = items.map(it => `
    <div class="mini-menu-item ${it.active ? 'active-opt' : ''}" onclick="${it.action};closeMiniMenu()">
      <span style="font-size:18px;line-height:1">${it.icon}</span>
      <span>${it.label}</span>
      ${it.active ? '<span style="margin-left:auto;font-size:13px">✓</span>' : ''}
    </div>
  `).join('');

  // Posicionar cerca del botón
  const rect = btnEl.getBoundingClientRect();
  menu.style.minWidth = '190px';
  const menuH = 3 * 50; // aprox 3 items * 50px
  const spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow > menuH + 8) {
    menu.style.top    = (rect.bottom + 4) + 'px';
    menu.style.bottom = '';
  } else {
    menu.style.top    = '';
    menu.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
  }
  // Alinear a la derecha del botón sin salir de pantalla
  const rightOffset = window.innerWidth - rect.right;
  menu.style.right = Math.max(4, rightOffset) + 'px';
  menu.style.left  = '';

  menu.classList.add('open');
  backdrop.classList.add('open');
}

function closeMiniMenu() {
  document.getElementById('mini-menu').classList.remove('open');
  document.getElementById('mini-menu-backdrop').classList.remove('open');
  _miniMenuBoxeadorId = null;
}

// ══════════════════════════════════════════
//  TAB: MATCH — lista de rivales
// ══════════════════════════════════════════
function calcScore(b1, b2) {
  const pesoProm = ((b1.peso || 0) + (b2.peso || 0)) / 2 || 1;
  const diffRelativa = Math.abs((b1.peso || 0) - (b2.peso || 0)) / pesoProm;
  const scorePeso = Math.exp(-8 * diffRelativa);

  const expProm = ((b1.peleas || 0) + (b2.peleas || 0)) / 2;
  const diffExpRel = Math.abs((b1.peleas || 0) - (b2.peleas || 0)) / (expProm + 3);
  const scoreExp = Math.exp(-4 * diffExpRel);

  const ventajaPeso = (b1.peso || 0) - (b2.peso || 0);
  const ventajaExp  = (b1.peleas || 0) - (b2.peleas || 0);
  const compensacion = (ventajaPeso * ventajaExp < 0) ? 0.10 : 0;

  return Math.min(1, 0.50 * scorePeso + 0.50 * scoreExp + compensacion);
}

function getDiscardReason(base, rival) {
  if (rival.id === base.id) return 'Es el mismo boxeador';
  if (rival.baja) return 'Boxeador dado de baja';
  if (base.sexo && rival.sexo && base.sexo !== rival.sexo) return 'Distinto sexo';
  if (base.gimnasio && rival.gimnasio && base.gimnasio === rival.gimnasio) return 'Mismo gimnasio';
  const edadBase  = base.edad  || 0;
  const edadRival = rival.edad || 0;
  const baseMenor  = edadBase  < 18;
  const rivalMenor = edadRival < 18;
  if (baseMenor !== rivalMenor) return 'Menor vs adulto';
  if (baseMenor && rivalMenor && Math.abs(edadBase - edadRival) > 2) return 'Menores con más de 2 años de diferencia';
  return null;
}

function renderRivales() {
  const base = STATE.boxeadores.find(x => x.id === STATE.matchBase);
  if (!base) return;

  const rSearch  = (document.getElementById('rival-search')?.value || '').toLowerCase();
  const rPesoMin = parseFloat(document.getElementById('rival-peso-min')?.value) || null;
  const rPesoMax = parseFloat(document.getElementById('rival-peso-max')?.value) || null;
  const rGym     = document.getElementById('rival-gym-filter')?.value || '';
  const rEstado  = document.getElementById('rival-estado-filter')?.value || '';

  const discarded = [];
  let candidates = [];

  STATE.boxeadores.forEach(rival => {
    const reason = getDiscardReason(base, rival);
    if (reason) { discarded.push({ rival, reason }); return; }

    // Aplicar filtros solo a los no descartados
    if (rSearch  && !rival.nombre?.toLowerCase().includes(rSearch))         return;
    if (rPesoMin && (rival.peso || 0) < rPesoMin)                           return;
    if (rPesoMax && (rival.peso || 0) > rPesoMax)                           return;
    if (rGym     && rival.gimnasio !== rGym)                                 return;
    if (rEstado === 'libre'      && getPeleaActiva(rival.id))                return;
    if (rEstado === 'emparejado' && !getPeleaActiva(rival.id))               return;

    candidates.push({ rival, score: calcScore(base, rival) });
  });

  candidates.sort((a, b) => b.score - a.score);

  const container = document.getElementById('match-rival-list');
  let html = '';

  if (!candidates.length) {
    html += `<div class="empty-state"><p>No hay rivales compatibles con esos filtros</p></div>`;
  } else {
    html += candidates.map(({ rival, score }) => {
      const pct = Math.round(score * 100);
      const pelea = getPeleaActiva(rival.id);
      const diffPeso   = Math.abs((base.peso   || 0) - (rival.peso   || 0)).toFixed(1);
      const diffPeleas = Math.abs((base.peleas || 0) - (rival.peleas || 0));
      return `
        <div class="rival-row">
          <div class="rival-row-top">
            <div>
              <div class="rival-name">${esc(rival.nombre)}</div>
              <div class="rival-sub">${esc(rival.gimnasio || '—')} · ${rival.peso ?? '?'}kg · ${rival.edad ?? '?'} años · ${rival.peleas ?? 0} peleas</div>
            </div>
            ${pelea ? '<span class="badge badge-emparejado">Ya emparejado</span>' : '<span class="badge badge-libre">Disponible</span>'}
          </div>
          <div class="score-bar-wrap">
            <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%"></div></div>
            <div class="score-meta">
              <span>Compatibilidad: <strong>${pct}%</strong></span>
              <span>Δ${diffPeso}kg &nbsp; Δ${diffPeleas}P</span>
            </div>
          </div>
          <div class="rival-actions">
            <button class="btn btn-primary btn-sm" onclick="emparejar('${base.id}','${rival.id}')">⚔️ Emparejar</button>
          </div>
        </div>
      `;
    }).join('');
  }

  if (discarded.length) {
    html += `<div class="section-label" style="margin-top:16px">Descartados (${discarded.length})</div>`;
    html += discarded.map(({ rival, reason }) => `
      <div class="rival-row discarded">
        <div class="rival-row-top">
          <div>
            <div class="rival-name">${esc(rival.nombre)}</div>
            <div class="rival-sub">${esc(rival.gimnasio || '—')} · ${rival.peso ?? '?'}kg</div>
          </div>
        </div>
        <div class="discard-reason">🚫 ${reason}</div>
      </div>
    `).join('');
  }

  container.innerHTML = html;
}

// ══════════════════════════════════════════
//  EMPAREJAR
// ══════════════════════════════════════════
async function emparejar(baseId, rivalId) { if (isLector()) return;
  const pelaRival = getPeleaActiva(rivalId);
  const pelaBase  = getPeleaActiva(baseId);

  if (pelaRival) {
    const rival = STATE.boxeadores.find(x => x.id === rivalId);
    showConfirm(
      'Rival ya emparejado',
      `${rival.nombre} ya tiene una pelea activa. ¿Cancelar la anterior y crear una nueva pelea?`,
      async () => {
        await cancelarPeleas(pelaBase, pelaRival);
        await crearPelea(baseId, rivalId);
      },
      { dangerLabel: 'Sí, reemplazar' }
    );
  } else if (pelaBase) {
    const base = STATE.boxeadores.find(x => x.id === baseId);
    showConfirm(
      'Base ya emparejado',
      `${base.nombre} ya tiene una pelea activa. ¿Cancelar la anterior y crear una nueva?`,
      async () => {
        await cancelarPeleas(pelaBase, null);
        await crearPelea(baseId, rivalId);
      },
      { dangerLabel: 'Sí, reemplazar' }
    );
  } else {
    await crearPelea(baseId, rivalId);
  }
}

async function cancelarPeleas(...peleas) {
  for (const p of peleas) {
    if (p) await sb.from('peleas').update({ cancelada: true, motivo_cancelacion: 'Reemplazada por nueva pelea' }).eq('id', p.id);
  }
}

async function crearPelea(b1Id, b2Id) {
  const maxOrden = STATE.peleas.reduce((m, p) => Math.max(m, p.orden || 0), 0);
  await sb.from('peleas').insert({ boxeador1_id: b1Id, boxeador2_id: b2Id, orden: maxOrden + 1, cancelada: false });
  showToast('✅ Pelea creada');
  switchTab('peleas');
}

// Devuelve un Map: peleaId → número global (1, 2, 3...)
// Orden: bloques (por orden de bloque → posición dentro), luego sin bloque
function buildPeleaOrdenMap() {
  const activas = STATE.peleas.filter(p => !p.cancelada);
  const map = new Map();
  let n = 1;
  STATE.bloques.slice().sort((a, b) => (a.orden||0) - (b.orden||0)).forEach(bl => {
    STATE.peleasBloques
      .filter(pb => pb.bloque_id === bl.id)
      .sort((a, b) => (a.posicion||0) - (b.posicion||0))
      .forEach(pb => {
        if (activas.find(p => p.id === pb.pelea_id)) map.set(pb.pelea_id, n++);
      });
  });
  activas
    .filter(p => !STATE.peleasBloques.find(pb => pb.pelea_id === p.id))
    .sort((a, b) => (a.orden||0) - (b.orden||0))
    .forEach(p => map.set(p.id, n++));
  return map;
}

function renderPeleas() {
  destroySortables();
  const container = document.getElementById('peleas-content');

  const todasActivas = STATE.peleas.filter(p => !p.cancelada);
  const canceladas   = STATE.peleas.filter(p => p.cancelada);

  // Aplicar filtros a activas (canceladas siempre al final, sin filtrar)
  const pSearch = (document.getElementById('search-peleas')?.value || '').toLowerCase();
  const pGym    = document.getElementById('peleas-gym-filter')?.value || '';
  let activas = todasActivas;
  if (pSearch || pGym) {
    activas = todasActivas.filter(p => {
      const [b1, b2] = getPeleaBoxeadores(p);
      if (pSearch) {
        const n1 = (b1?.nombre || '').toLowerCase(), n2 = (b2?.nombre || '').toLowerCase();
        if (!n1.includes(pSearch) && !n2.includes(pSearch)) return false;
      }
      if (pGym && b1?.gimnasio !== pGym && b2?.gimnasio !== pGym) return false;
      return true;
    });
  }

  if (!todasActivas.length && !canceladas.length) {
    container.innerHTML = `<div class="empty-state"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/></svg><p>No hay peleas todavía</p></div>`;
    return;
  }

  // Agrupar activas por bloque
  const bloqueMap = {};
  STATE.bloques.sort((a, b) => (a.orden||0) - (b.orden||0)).forEach(bl => { bloqueMap[bl.id] = { bloque: bl, peleas: [] }; });
  const sinBloque = [];

  activas.forEach(pelea => {
    const pb = STATE.peleasBloques.find(x => x.pelea_id === pelea.id);
    if (pb && bloqueMap[pb.bloque_id]) {
      bloqueMap[pb.bloque_id].peleas.push({ pelea, pos: pb.posicion || 0 });
    } else {
      sinBloque.push(pelea);
    }
  });

  // Ordenar peleas dentro de cada bloque
  Object.values(bloqueMap).forEach(g => g.peleas.sort((a, b) => a.pos - b.pos));
  sinBloque.sort((a, b) => (a.orden||0) - (b.orden||0));

  const ordenMap = buildPeleaOrdenMap();
  let html = '<div id="bloques-sortable-container">';

  // Secciones con bloque
  Object.values(bloqueMap).forEach(({ bloque, peleas: bp }) => {
    html += `
      <div class="bloque-section" data-bloque-id="${bloque.id}">
        <div class="bloque-header">
          <span><span class="handle">☰</span>${esc(bloque.nombre || '?')}</span>
          <span class="bloque-header-count">${bp.length} pelea${bp.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="bloque-list pelea-sortable" data-bloque-id="${bloque.id}">
          ${bp.map(({ pelea }) => peleaItemHTML(pelea, ordenMap)).join('')}
        </div>
      </div>`;
  });

  html += '</div>';

  // Sin bloque
  html += `
    <div class="bloque-section" style="margin-top:${Object.keys(bloqueMap).length ? '16px' : '0'}">
      <div class="bloque-header" style="cursor:default;background:var(--bg2)">
        <span>Sin bloque</span>
        <span style="font-size:12px;color:var(--text2);font-weight:400">${sinBloque.length} pelea${sinBloque.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="bloque-list pelea-sortable" data-bloque-id="">
        ${sinBloque.map(p => peleaItemHTML(p, ordenMap)).join('')}
      </div>
    </div>`;

  // Canceladas
  if (canceladas.length) {
    html += `<div class="canceladas-section"><div class="section-label">Canceladas (${canceladas.length})</div>`;
    html += canceladas.map(p => {
      const [b1, b2] = getPeleaBoxeadores(p);
      return `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
          <div style="flex:1;min-width:0;opacity:.5">
            <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(b1?.nombre || '?')} vs ${esc(b2?.nombre || '?')}</div>
            ${p.motivo_cancelacion ? `<div style="font-size:12px;color:var(--text2);margin-top:4px">Motivo: ${esc(p.motivo_cancelacion)}</div>` : ''}
          </div>
          <button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="eliminarPeleaCancelada('${p.id}')">🗑 Eliminar</button>
        </div>`;
    }).join('');
    html += '</div>';
  }

  container.innerHTML = html;
  initSortables();
}

function getPeleaBoxeadores(pelea) {
  return [
    STATE.boxeadores.find(b => b.id === pelea.boxeador1_id),
    STATE.boxeadores.find(b => b.id === pelea.boxeador2_id),
  ];
}

function getAsistenciaInfo(b1, b2) {
  const getS = b => !b ? 'sin' : b.baja ? 'baja' : (b.presente === true ? 'pres' : 'sin');
  const s1 = getS(b1), s2 = getS(b2);
  const icon = { pres: '✅', baja: '🔴', sin: '⬜' };
  const icons = `${icon[s1]}${icon[s2]}`;
  let cssClass = 'asist-gris', label = 'Sin confirmar', highlight = false;
  if (s1 === 'pres' && s2 === 'pres')                                    { cssClass = 'asist-verde';    label = 'Ambos presentes';   }
  else if ((s1 === 'pres' || s2 === 'pres') && (s1 === 'baja' || s2 === 'baja')) { cssClass = 'asist-rojo'; label = 'Uno dado de baja'; highlight = true; }
  else if (s1 === 'pres' || s2 === 'pres')                               { cssClass = 'asist-amarillo'; label = 'Uno confirmado';     }
  return { icons, cssClass, label, highlight };
}

function peleaItemHTML(pelea, ordenMap) {
  const [b1, b2] = getPeleaBoxeadores(pelea);
  const pb = STATE.peleasBloques.find(x => x.pelea_id === pelea.id);
  const num = ordenMap?.get(pelea.id) ?? '';
  const asist = getAsistenciaInfo(b1, b2);
  return `
    <div class="pelea-item ${asist.highlight ? 'asist-alerta' : ''}" data-pelea-id="${pelea.id}">
      <div class="pelea-handle">☰</div>
      <div class="pelea-info">
        <div class="pelea-names"><span style="color:var(--accent);font-size:13px;font-weight:800;margin-right:6px">#${num}</span>${esc(b1?.nombre || '?')} vs ${esc(b2?.nombre || '?')}</div>
        <div class="pelea-asistencia ${asist.cssClass}">${asist.icons} ${asist.label}</div>
        <div class="pelea-detail" style="margin-top:4px">
          ${b1 ? `${b1.peso ?? '?'}kg · ${b1.edad ?? '?'}a · ${esc(b1.gimnasio || '—')}` : ''}<br>
          ${b2 ? `${b2.peso ?? '?'}kg · ${b2.edad ?? '?'}a · ${esc(b2.gimnasio || '—')}` : ''}
        </div>
        <div class="pelea-actions-row" style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="showAssignBloque('${pelea.id}')">📅 Bloque</button>
          <button class="btn btn-ghost btn-sm" onclick="reasignarBoxeador('${pelea.id}',1)">↔ Reemplazar ${esc(b2?.nombre || '?')}</button>
          <button class="btn btn-ghost btn-sm" onclick="reasignarBoxeador('${pelea.id}',2)">↔ Reemplazar ${esc(b1?.nombre || '?')}</button>
          <button class="btn btn-danger btn-sm" onclick="cancelarPelea('${pelea.id}')">✕</button>
        </div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
//  DRAG & DROP — Sortable.js
// ══════════════════════════════════════════
function initSortables() {
  // Drag de bloques enteros
  const bloqueContainer = document.getElementById('bloques-sortable-container');
  if (bloqueContainer) {
    const s = Sortable.create(bloqueContainer, {
      handle: '.bloque-header',
      animation: 150,
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onEnd: onBloqueReorder,
    });
    _sortableInstances.push(s);
  }

  // Drag de peleas dentro de bloques (cross-bloque)
  document.querySelectorAll('.pelea-sortable').forEach(list => {
    const s = Sortable.create(list, {
      group: 'peleas',
      handle: '.pelea-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onEnd: onPeleaReorder,
    });
    _sortableInstances.push(s);
  });
}

function destroySortables() {
  _sortableInstances.forEach(s => { try { s.destroy(); } catch(e) {} });
  _sortableInstances = [];
}

async function onBloqueReorder(evt) { if (isLector()) { await loadAll(); render(); return; }
  const container = document.getElementById('bloques-sortable-container');
  if (!container) return;
  const sections = [...container.querySelectorAll('.bloque-section[data-bloque-id]')];
  const updates  = sections.map((el, i) => ({ id: el.dataset.bloqueId, orden: i }));
  for (const u of updates) {
    await sb.from('bloques').update({ orden: u.orden }).eq('id', u.id);
  }
}

async function onPeleaReorder(evt) { if (isLector()) { await loadAll(); render(); return; }
  const targetList  = evt.to;
  const targetBloque= targetList.dataset.bloqueId;
  const peleaId     = evt.item.dataset.peleaId;

  if (!peleaId) return;

  // Determinar el bloque destino
  const pb = STATE.peleasBloques.find(x => x.pelea_id === peleaId);

  if (targetBloque) {
    // Mover a bloque
    if (pb && pb.bloque_id === targetBloque) {
      // Solo actualizar posición
    } else if (pb) {
      await sb.from('pelea_bloque').update({ bloque_id: targetBloque }).eq('id', pb.id);
    } else {
      await sb.from('pelea_bloque').insert({ pelea_id: peleaId, bloque_id: targetBloque });
    }
    // Actualizar posiciones dentro del bloque
    const items = [...targetList.querySelectorAll('.pelea-item')];
    for (let i = 0; i < items.length; i++) {
      const pid = items[i].dataset.peleaId;
      const existingPb = STATE.peleasBloques.find(x => x.pelea_id === pid && x.bloque_id === targetBloque);
      if (existingPb) await sb.from('pelea_bloque').update({ posicion: i }).eq('id', existingPb.id);
    }
  } else {
    // Mover a "Sin bloque"
    if (pb) await sb.from('pelea_bloque').delete().eq('id', pb.id);
    // Actualizar orden en peleas
    const items = [...targetList.querySelectorAll('.pelea-item')];
    for (let i = 0; i < items.length; i++) {
      await sb.from('peleas').update({ orden: i }).eq('id', items[i].dataset.peleaId);
    }
  }
  await loadAll();
}

// ══════════════════════════════════════════
//  ACCIONES DE PELEAS
// ══════════════════════════════════════════
function eliminarPeleaCancelada(id) {
  if (isLector()) return;
  const p = STATE.peleas.find(x => x.id === id);
  const [b1, b2] = getPeleaBoxeadores(p);
  showConfirm(
    'Eliminar pelea cancelada',
    `¿Eliminar definitivamente "${b1?.nombre || '?'} vs ${b2?.nombre || '?'}"?`,
    async () => {
      await sb.from('pelea_bloque').delete().eq('pelea_id', id);
      await sb.from('peleas').delete().eq('id', id);
      showToast('🗑️ Pelea eliminada');
    },
    { dangerLabel: 'Sí, eliminar' }
  );
}

function cancelarPelea(id) { if (isLector()) return;
  showConfirm('Cancelar pelea', '¿Cancelar esta pelea? Ambos boxeadores quedarán libres.', async () => {
    const motivo = document.getElementById('confirm-motivo').value.trim() || 'Cancelada manualmente';
    await sb.from('peleas').update({ cancelada: true, motivo_cancelacion: motivo }).eq('id', id);
    showToast('Pelea cancelada');
  }, { showMotivo: true, dangerLabel: 'Cancelar pelea' });
}

function reasignarBoxeador(peleaId, slot) { if (isLector()) return;
  const pelea = STATE.peleas.find(p => p.id === peleaId);
  if (!pelea) return;
  const boxeadorId = slot === 1 ? pelea.boxeador1_id : pelea.boxeador2_id;
  STATE.matchBase = boxeadorId;
  STATE.reasignando = true;
  switchTab('match');
  selectMatchBase(boxeadorId);
  document.getElementById('reasign-banner').style.display = '';
}

function cancelarReasignacion() {
  STATE.reasignando = false;
  document.getElementById('reasign-banner').style.display = 'none';
  clearMatchBase();
  switchTab('peleas');
}

function showAssignBloque(peleaId) { if (isLector()) return;
  document.getElementById('assign-pelea-id').value = peleaId;
  const pb = STATE.peleasBloques.find(x => x.pelea_id === peleaId);
  const opts = STATE.bloques.map(bl =>
    `<option value="${bl.id}" ${pb?.bloque_id === bl.id ? 'selected' : ''}>${esc(bl.nombre)}</option>`
  ).join('');
  document.getElementById('assign-bloque-sel').innerHTML =
    `<option value="">Sin bloque</option>` + opts;
  openModal('modal-assign-bloque');
}

async function doAssignBloque() {
  const peleaId  = document.getElementById('assign-pelea-id').value;
  const bloqueId = document.getElementById('assign-bloque-sel').value;
  const pb = STATE.peleasBloques.find(x => x.pelea_id === peleaId);

  if (bloqueId) {
    const maxPos = STATE.peleasBloques.filter(x => x.bloque_id === bloqueId)
      .reduce((m, x) => Math.max(m, x.posicion || 0), -1);
    if (pb) {
      await sb.from('pelea_bloque').update({ bloque_id: bloqueId, posicion: maxPos + 1 }).eq('id', pb.id);
    } else {
      await sb.from('pelea_bloque').insert({ pelea_id: peleaId, bloque_id: bloqueId, posicion: maxPos + 1 });
    }
  } else {
    if (pb) await sb.from('pelea_bloque').delete().eq('id', pb.id);
  }

  closeModal('modal-assign-bloque');
  showToast('✅ Bloque asignado');
}

// ══════════════════════════════════════════
//  EXPORTAR CSV
// ══════════════════════════════════════════
function exportCSV() {
  const activas = STATE.peleas.filter(p => !p.cancelada);

  // Ordenar igual que en pantalla
  const rows = [];
  let orden = 1;

  STATE.bloques.sort((a, b) => (a.orden||0) - (b.orden||0)).forEach(bl => {
    const enBloque = STATE.peleasBloques
      .filter(pb => pb.bloque_id === bl.id)
      .sort((a, b) => (a.posicion||0) - (b.posicion||0));
    enBloque.forEach(pb => {
      const pelea = activas.find(p => p.id === pb.pelea_id);
      if (pelea) rows.push({ pelea, bloque: bl.nombre, orden: orden++ });
    });
  });

  activas.forEach(pelea => {
    if (!STATE.peleasBloques.find(pb => pb.pelea_id === pelea.id)) {
      rows.push({ pelea, bloque: 'Sin bloque', orden: orden++ });
    }
  });

  const header = ['Orden','Bloque','B1 Nombre','B1 Peso (kg)','B1 Edad','B1 Gimnasio','B2 Nombre','B2 Peso (kg)','B2 Edad','B2 Gimnasio'];
  const lines = [header.join(',')];

  rows.forEach(({ pelea, bloque, orden: ord }) => {
    const b1 = STATE.boxeadores.find(x => x.id === pelea.boxeador1_id);
    const b2 = STATE.boxeadores.find(x => x.id === pelea.boxeador2_id);
    const csvCell = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
    lines.push([
      ord,
      csvCell(bloque),
      csvCell(b1?.nombre), b1?.peso ?? '', b1?.edad ?? '', csvCell(b1?.gimnasio),
      csvCell(b2?.nombre), b2?.peso ?? '', b2?.edad ?? '', csvCell(b2?.gimnasio),
    ].join(','));
  });

  const BOM = '﻿';
  const csv = BOM + lines.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'peleas_evento.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📥 CSV descargado');
}

// ══════════════════════════════════════════
//  TAB: BLOQUES
// ══════════════════════════════════════════
function renderBloques() {
  const container = document.getElementById('bloques-content');
  if (!STATE.bloques.length) {
    container.innerHTML = `<div class="empty-state"><p>No hay bloques. Agregá el primero.</p></div>`;
    return;
  }

  const sorted = [...STATE.bloques].sort((a, b) => (a.orden||0) - (b.orden||0));
  container.innerHTML = `<div id="bloques-list-sortable">` + sorted.map(bl => {
    const peleasEnBloque = STATE.peleasBloques.filter(pb => pb.bloque_id === bl.id).length;
    return `
      <div class="bloque-card" data-bloque-id="${bl.id}">
        <div class="bloque-card-handle">☰</div>
        <div class="bloque-card-info">
          <div class="bloque-card-name">${esc(bl.nombre || '?')}</div>
          <div class="bloque-card-sub">${peleasEnBloque} pelea${peleasEnBloque !== 1 ? 's' : ''} asignada${peleasEnBloque !== 1 ? 's' : ''}</div>
        </div>
        <button style="min-height:36px;min-width:36px;padding:6px;border-radius:8px;border:none;background:rgba(0,0,0,.25);color:#fff;font-size:16px;cursor:pointer" onclick="eliminarBloque('${bl.id}')">🗑</button>
      </div>`;
  }).join('') + '</div>';

  // Sortable para bloques
  const list = document.getElementById('bloques-list-sortable');
  if (list) {
    Sortable.create(list, {
      handle: '.bloque-card-handle',
      animation: 150,
      ghostClass: 'sortable-ghost',
      onEnd: async () => {
        const items = [...list.querySelectorAll('.bloque-card')];
        for (let i = 0; i < items.length; i++) {
          await sb.from('bloques').update({ orden: i }).eq('id', items[i].dataset.bloqueId);
        }
        await loadAll();
      },
    });
  }
}

function showAddBloque() { openModal('modal-bloque'); }

async function saveBloque() { if (isLector()) return;
  const inicio = document.getElementById('b-inicio').value;
  const fin    = document.getElementById('b-fin').value;
  if (!inicio || !fin) { showToast('❌ Ingresá hora inicio y fin'); return; }
  const nombre = `${inicio} - ${fin}`;
  const maxOrden = STATE.bloques.reduce((m, b) => Math.max(m, b.orden||0), -1);
  await sb.from('bloques').insert({ nombre, hora_inicio: inicio, hora_fin: fin, orden: maxOrden + 1 });
  document.getElementById('b-inicio').value = '';
  document.getElementById('b-fin').value    = '';
  closeModal('modal-bloque');
  showToast('✅ Bloque creado');
}

async function eliminarBloque(id) { if (isLector()) return;
  const bl = STATE.bloques.find(x => x.id === id);
  const count = STATE.peleasBloques.filter(pb => pb.bloque_id === id).length;
  const msg = count
    ? `¿Eliminar el bloque "${bl.nombre}"? Las ${count} peleas asignadas quedarán "Sin bloque".`
    : `¿Eliminar el bloque "${bl.nombre}"?`;
  showConfirm('Eliminar bloque', msg, async () => {
    await sb.from('pelea_bloque').delete().eq('bloque_id', id);
    await sb.from('bloques').delete().eq('id', id);
    showToast('🗑️ Bloque eliminado');
  }, { dangerLabel: 'Eliminar' });
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('boxing-theme', isLight ? 'light' : 'dark');
}

// Restaurar tema guardado
(function() {
  const saved = localStorage.getItem('boxing-theme');
  if (saved === 'light') {
    document.body.classList.add('light');
    // El botón se renderiza después del init, se actualiza en el primer render
  }
})();
